services:
  backend:
    build:
      context: ./song-genie
    ports:
      - "5000:5000"
    environment:
      - SONG_GENIE_FLASK_HOST=0.0.0.0
      - SONG_GENIE_FLASK_PORT=5000
      - SONG_GENIE_FLASK_DEBUG=false
      - SONG_GENIE_BANDIT_LAMBDA=0.3
    volumes:
      - ./song-genie/backend/data:/app/backend/data

  frontend:
    build:
      context: ./song-genie-ui
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    depends_on:
      - backend

